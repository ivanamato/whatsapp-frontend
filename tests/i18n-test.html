<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>i18n Test</title>
  <link rel="stylesheet" href="/whatsapp-inbox.css" />
  <style>
    #default-mount, #custom-mount, #partial-mount { width: 800px; height: 500px; border: 1px solid #ccc; margin: 10px; }
  </style>
</head>
<body>
  <div id="default-mount"></div>
  <div id="custom-mount"></div>
  <div id="partial-mount"></div>

  <script src="/whatsapp-inbox.umd.js"></script>
  <script>
    const lib = window.WhatsAppInbox;

    // 1. Default English translations — no devices, so we see empty/loading states
    lib.mount(document.getElementById('default-mount'), {
      devices: [{
        id: 'test',
        apiUrl: 'http://localhost:99999',
        instanceToken: 'fake',
        instanceName: 'test-instance',
      }],
    });

    // 2. Custom translations (Spanish)
    lib.mount(document.getElementById('custom-mount'), {
      devices: [{
        id: 'test',
        apiUrl: 'http://localhost:99999',
        instanceToken: 'fake',
        instanceName: 'test-instance',
      }],
      translations: {
        'conversationList.chats': 'Conversaciones',
        'conversationList.searchPlaceholder': 'Buscar o iniciar nuevo chat',
        'conversationList.noConversationsYet': 'Sin conversaciones aún',
        'messageView.title': 'Bandeja WhatsApp',
        'messageView.emptyStateDescription': 'Envía y recibe mensajes. Selecciona una conversación de la barra lateral para empezar.',
        'messageView.typeMessage': 'Escribe un mensaje',
        'instanceSelector.loadingDevices': 'Cargando dispositivos...',
      },
    });

    // 3. Partial translations — only override some keys, rest should fall back to English
    lib.mount(document.getElementById('partial-mount'), {
      devices: [{
        id: 'test',
        apiUrl: 'http://localhost:99999',
        instanceToken: 'fake',
        instanceName: 'test-instance',
      }],
      translations: {
        'conversationList.chats': 'Chats Personalizados',
      },
    });
  </script>
</body>
</html>
