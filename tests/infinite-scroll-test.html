<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Infinite Scroll Test</title>
  <link rel="stylesheet" href="/whatsapp-inbox.css" />
  <style>
    #mount { width: 900px; height: 600px; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <div id="mount"></div>

  <script src="/whatsapp-inbox.umd.js"></script>
  <script>
    const lib = window.WhatsAppInbox;

    lib.mount(document.getElementById('mount'), {
      devices: [{
        id: 'scroll-test',
        apiUrl: 'http://localhost:99999',
        instanceToken: 'fake-token',
        instanceName: 'scroll-instance',
      }],
    });
  </script>
</body>
</html>
