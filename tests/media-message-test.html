<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Media Message Test</title>
  <link rel="stylesheet" href="/whatsapp-inbox.css" />
  <style>
    #app { width: 1000px; height: 700px; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // Mock fetch to intercept Evolution API calls and return fake data with media messages
    const originalFetch = window.fetch;

    // 1x1 red PNG as base64 (valid image)
    const TINY_PNG_BASE64 = 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==';

    const INSTANCE_NAME = 'test-instance';
    const CHAT_JID = '5511999999999@s.whatsapp.net';

    const mockMessages = [
      {
        key: { id: 'msg-text-1', fromMe: false, remoteJid: CHAT_JID },
        messageTimestamp: Math.floor(Date.now() / 1000) - 300,
        messageType: 'conversation',
        message: { conversation: 'Hello, check these files!' },
      },
      {
        key: { id: 'msg-image-1', fromMe: false, remoteJid: CHAT_JID },
        messageTimestamp: Math.floor(Date.now() / 1000) - 240,
        messageType: 'imageMessage',
        message: {
          imageMessage: {
            url: 'https://fake.com/image.jpg',
            mimetype: 'image/png',
            caption: 'Test image caption',
            mediaKey: 'abc123',
          },
        },
      },
      {
        key: { id: 'msg-image-2', fromMe: true, remoteJid: CHAT_JID },
        messageTimestamp: Math.floor(Date.now() / 1000) - 180,
        messageType: 'imageMessage',
        message: {
          imageMessage: {
            url: 'https://fake.com/photo2.jpg',
            mimetype: 'image/png',
            caption: 'Second photo',
            mediaKey: 'xyz789',
          },
        },
      },
      {
        key: { id: 'msg-doc-1', fromMe: false, remoteJid: CHAT_JID },
        messageTimestamp: Math.floor(Date.now() / 1000) - 60,
        messageType: 'documentMessage',
        message: {
          documentMessage: {
            url: 'https://fake.com/report.pdf',
            mimetype: 'application/pdf',
            fileName: 'report.pdf',
            title: 'report.pdf',
            mediaKey: 'jkl012',
          },
        },
      },
    ];

    const mockChats = [
      {
        id: CHAT_JID,
        remoteJid: CHAT_JID,
        name: 'Test Contact',
        pushName: 'Test Contact',
        unreadCount: 0,
        updatedAt: new Date().toISOString(),
        lastMessage: {
          key: { id: 'msg-text-1', fromMe: false, remoteJid: CHAT_JID },
          pushName: 'Test Contact',
          messageType: 'conversation',
          message: { conversation: 'Hello, check these files!' },
          messageTimestamp: Math.floor(Date.now() / 1000) - 300,
        },
      },
    ];

    function getMediaBase64ForMessage(messageId) {
      if (messageId === 'msg-image-1') return { base64: TINY_PNG_BASE64, mimetype: 'image/png' };
      if (messageId === 'msg-image-2') return { base64: TINY_PNG_BASE64, mimetype: 'image/png' };
      if (messageId === 'msg-doc-1') return { base64: TINY_PNG_BASE64, mimetype: 'application/pdf' };
      return null;
    }

    window.fetch = async function(url, options) {
      const urlStr = typeof url === 'string' ? url : url.toString();
      const body = options?.body ? JSON.parse(options.body) : {};

      // Connection state - return "open"
      if (urlStr.includes('/instance/connectionState/')) {
        return new Response(JSON.stringify({ instance: { state: 'open' } }), {
          status: 200,
          headers: { 'Content-Type': 'application/json' },
        });
      }

      // Find chats
      if (urlStr.includes('/chat/findChats/')) {
        return new Response(JSON.stringify(mockChats), {
          status: 200,
          headers: { 'Content-Type': 'application/json' },
        });
      }

      // Find contacts
      if (urlStr.includes('/chat/findContacts/')) {
        return new Response(JSON.stringify([
          { remoteJid: CHAT_JID, pushName: 'Test Contact' },
        ]), {
          status: 200,
          headers: { 'Content-Type': 'application/json' },
        });
      }

      // Find messages
      if (urlStr.includes('/chat/findMessages/')) {
        // If searching by specific message ID (for getMediaUrl flow)
        if (body?.where?.key?.id) {
          const msg = mockMessages.find(m => m.key.id === body.where.key.id);
          return new Response(JSON.stringify({
            messages: {
              total: msg ? 1 : 0,
              pages: 1,
              currentPage: 1,
              records: msg ? [msg] : [],
            },
          }), {
            status: 200,
            headers: { 'Content-Type': 'application/json' },
          });
        }
        // Regular message fetch for conversation
        return new Response(JSON.stringify({
          messages: {
            total: mockMessages.length,
            pages: 1,
            currentPage: 1,
            records: mockMessages,
          },
        }), {
          status: 200,
          headers: { 'Content-Type': 'application/json' },
        });
      }

      // Get base64 from media message
      if (urlStr.includes('/chat/getBase64FromMediaMessage/')) {
        const msgKey = body?.message?.key;
        if (msgKey?.id) {
          const media = getMediaBase64ForMessage(msgKey.id);
          if (media) {
            return new Response(JSON.stringify(media), {
              status: 200,
              headers: { 'Content-Type': 'application/json' },
            });
          }
        }
        return new Response(JSON.stringify({}), {
          status: 404,
          headers: { 'Content-Type': 'application/json' },
        });
      }

      // Fallback to original fetch
      return originalFetch.call(this, url, options);
    };
  </script>

  <script src="/whatsapp-inbox.umd.js"></script>
  <script>
    const lib = window.WhatsAppInbox;
    lib.mount(document.getElementById('app'), {
      devices: [{
        id: 'test-device',
        label: 'Test WhatsApp',
        apiUrl: 'https://fake-api.test',
        instanceToken: 'fake-token',
        instanceName: 'test-instance',
      }],
    });
  </script>
</body>
</html>
