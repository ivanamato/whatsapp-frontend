<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhatsApp Inbox — Vue 3 Example</title>
  <!-- Load the compiled library CSS -->
  <link rel="stylesheet" href="../../dist/whatsapp-inbox.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body,
    #app {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

  </style>
</head>

<body>
  <div id="app"></div>

  <!-- Vue 3 from CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <!-- Compiled WhatsApp Inbox library (UMD) -->
  <script src="../../dist/whatsapp-inbox.umd.js"></script>

  <script>
    const { createApp, ref, onMounted, onBeforeUnmount, nextTick } = Vue;


    const App = {
      setup() {
        const inboxRef = ref(null);
        const inboxContainer = ref(null);

        async function mountInbox() {
          await nextTick();

          const config = {
            "devices": [
              {
                "id": "device-1",
                "label": "Device 1",
                "apiUrl": "https://your-evolution-api.com",
                "apiKey": "your-api-key",
                "instanceName": "your-instance-1",
                "readonly": true
              },
              {
                "id": "device-2",
                "label": "Device 2",
                "apiUrl": "https://your-evolution-api.com",
                "apiKey": "your-api-key",
                "instanceName": "your-instance-2"
              }
            ],
            defaultDeviceId: 'device-1',
            translations: {
              // Lista de conversas                               
              'conversationList.chats': 'Conversas',
              'conversationList.autoUpdating': 'Atualizando automaticamente',
              'conversationList.searchPlaceholder': 'Pesquisar ou iniciar nova conversa',
              'conversationList.noConversationsFound': 'Nenhuma conversa encontrada',
              'conversationList.noConversationsYet': 'Nenhuma conversa ainda',
              'conversationList.selectInstance': 'Selecione uma instância para ver as conversas',
              'conversationList.yesterday': 'Ontem',

              // Visualização de mensagens
              'messageView.title': 'WhatsApp Inbox',
              'messageView.emptyStateDescription': 'Envie e receba mensagens. Selecione uma conversa na barra lateral para começar.',
              'messageView.encryptionNotice': 'As mensagens são protegidas com criptografia de ponta a ponta. Ninguém fora desta conversa, nem mesmo o WhatsApp, pode lê-las ou ouvi-las.',
              'messageView.messageDeleted': 'Esta mensagem foi apagada',
              'messageView.downloadFile': 'Baixar arquivo',
              'messageView.notDelivered': 'Não entregue',
              'messageView.readOnlyMode': 'Este dispositivo está em modo somente leitura',
              'messageView.uploadFile': 'Enviar arquivo',
              'messageView.sendInteractiveMessage': 'Enviar mensagem interativa',
              'messageView.typeMessage': 'Digite uma mensagem',
              'messageView.sendTemplate': 'Enviar template',
              'messageView.noInboundMessages': 'O usuário ainda não enviou mensagem. Envie um template ou aguarde a resposta.',
              'messageView.outside24HourWindow': 'A última mensagem foi há mais de 24 horas. Envie um template ou aguarde o usuário enviar uma mensagem.',
              'messageView.today': 'Hoje',
              'messageView.yesterday': 'Ontem',

              // Seletor de instância
              'instanceSelector.loadingDevices': 'Carregando dispositivos...',
              'instanceSelector.noDevicesConfigured': 'Nenhum dispositivo configurado',
              'instanceSelector.selectDevice': 'Selecionar dispositivo',
              'instanceSelector.allDevices': 'Todos os Dispositivos',
              'instanceSelector.connected': 'conectado(s)',
              'instanceSelector.close': 'Fechar',
              'instanceSelector.mergeDevices': 'Unificar dispositivos',

              // Menu de contexto
              'contextMenu.messageOptions': 'Opções da mensagem',
              'contextMenu.copy': 'Copiar',
              'contextMenu.forward': 'Encaminhar',
              'contextMenu.delete': 'Apagar',
              'contextMenu.deleteMessage': 'Apagar mensagem',
              'contextMenu.deleteConfirmation': 'Isso apagará a mensagem para todos no chat. Esta ação não pode ser desfeita.',
              'contextMenu.cancel': 'Cancelar',
              'contextMenu.deleteForEveryone': 'Apagar para todos',

              // Diálogo de encaminhamento
              'forwardDialog.title': 'Encaminhar mensagem',
              'forwardDialog.description': 'Escolha um contato para encaminhar esta mensagem',
              'forwardDialog.forwarding': 'Encaminhando:',
              'forwardDialog.searchContacts': 'Pesquisar contatos...',
              'forwardDialog.noContactsFound': 'Nenhum contato encontrado',
              'forwardDialog.cancel': 'Cancelar',
              'forwardDialog.forward': 'Encaminhar',

              // Seletor de template
              'templateSelector.title': 'Enviar mensagem de template',
              'templateSelector.description': 'Selecione um template para enviar para {phoneNumber}',
              'templateSelector.noTemplates': 'Nenhum template aprovado encontrado',
              'templateSelector.cancel': 'Cancelar',
              'templateSelector.send': 'Enviar',
              'templateSelector.notSupported': 'Templates ainda não são suportados para este provedor',

              // Parâmetros de template
              'templateParameters.title': 'Parâmetros do template',
              'templateParameters.description': 'Preencha os parâmetros para {templateName}',
              'templateParameters.fillAllParameters': 'Por favor, preencha todos os parâmetros',
              'templateParameters.example': 'Exemplo: {example}',
              'templateParameters.back': 'Voltar',
              'templateParameters.sendTemplate': 'Enviar template',
              'templateParameters.notSupported': 'Templates ainda não são suportados para este provedor',

              // Mensagem interativa
              'interactiveDialog.title': 'Enviar mensagem interativa',
              'interactiveDialog.description': 'Crie uma mensagem com botões interativos',
              'interactiveDialog.headerLabel': 'Cabeçalho (opcional)',
              'interactiveDialog.headerPlaceholder': 'Adicione um cabeçalho à sua mensagem',
              'interactiveDialog.bodyLabel': 'Corpo',
              'interactiveDialog.bodyPlaceholder': 'Digite o texto da mensagem',
              'interactiveDialog.buttonsLabel': 'Botões',
              'interactiveDialog.addButton': 'Adicionar botão',
              'interactiveDialog.buttonPlaceholder': 'Título do botão {index}',
              'interactiveDialog.moreButtons': 'Você pode adicionar mais {count} botão(ões)',
              'interactiveDialog.cancel': 'Cancelar',
              'interactiveDialog.send': 'Enviar',
              'interactiveDialog.validationError': 'Preencha o corpo e todos os títulos dos botões',
              'interactiveDialog.noConversation': 'Nenhuma conversa selecionada',
              'interactiveDialog.noInstance': 'Nenhuma instância selecionada',

              // Mídia
              'mediaMessage.unavailable': 'Mídia indisponível',
              'mediaMessage.downloadDocument': 'Baixar documento',
            }
          };

          inboxRef.value = WhatsAppInbox.mount(inboxContainer.value, config);
        }

        onMounted(() => {
          mountInbox();
        });

        onBeforeUnmount(() => {
          if (inboxRef.value) {
            inboxRef.value.unmount();
          }
        });

        return {
          inboxContainer,
        };
      },

      template: `
          <div ref="inboxContainer" style="height: 100%;"></div>
        `,
    };

    createApp(App).mount('#app');
  </script>
</body>

</html>
